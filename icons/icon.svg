<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1d30"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M64 8 L112 28 C112 28 116 72 64 120 C12 72 16 28 16 28 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Inner shield -->
  <path d="M64 18 L104 35 C104 35 107 72 64 112 C21 72 24 35 24 35 Z"
        fill="url(#innerGrad)"/>

  <!-- Three horizontal lines representing headers -->
  <rect x="40" y="44" width="36" height="4" rx="2" fill="#64748b" opacity="0.6"/>
  <rect x="40" y="56" width="28" height="4" rx="2" fill="#64748b" opacity="0.4"/>
  <rect x="40" y="68" width="32" height="4" rx="2" fill="#64748b" opacity="0.3"/>

  <!-- Checkmark -->
  <path d="M52 62 L60 70 L78 48"
        fill="none" stroke="url(#checkGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
