<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Headers</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Compact header -->
    <div id="header">
      <div id="grade-badge">-</div>
      <div id="site-info">
        <div id="site-url">Loading...</div>
        <div id="site-summary"></div>
      </div>
      <button id="theme-btn" title="Toggle light/dark theme">&#9788;</button>
      <button id="rescan-btn" title="Re-scan headers">&#8635;</button>
    </div>

    <!-- Quick status row -->
    <div id="quick-status"></div>

    <!-- External scan links -->
    <div id="external-scans">
      <button id="scan-secheaders" title="Scan on securityheaders.com">
        <span class="scan-icon">&#9881;</span> SecurityHeaders.com
      </button>
      <button id="scan-ssllabs" title="Scan on SSL Labs">
        <span class="scan-icon">&#128274;</span> SSL Labs
      </button>
    </div>

    <!-- Expand toggle -->
    <button id="toggle-details">Show Details <span class="arrow">&#9660;</span></button>

    <!-- Expandable details -->
    <div id="details">
      <!-- Security headers section -->
      <div class="section">
        <h3>Security Headers</h3>
        <div id="security-headers-list"></div>
      </div>

      <!-- Additional headers section -->
      <div class="section">
        <h3>Additional Headers</h3>
        <div id="additional-headers-list"></div>
      </div>

      <!-- Cookie analysis section -->
      <div class="section" id="cookie-section" style="display:none;">
        <h3>Cookies</h3>
        <div id="cookie-list"></div>
      </div>

      <!-- Information disclosure section -->
      <div class="section" id="disclosure-section" style="display:none;">
        <h3>Information Disclosure</h3>
        <div id="disclosure-list"></div>
      </div>

      <!-- Deprecated headers section -->
      <div class="section" id="deprecated-section" style="display:none;">
        <h3>Deprecated Headers</h3>
        <div id="deprecated-list"></div>
      </div>

      <!-- Raw headers section -->
      <div class="section">
        <div class="raw-header-row">
          <h3 class="raw-toggle" id="raw-toggle">Raw Headers <span class="arrow">&#9660;</span></h3>
          <button id="copy-raw-btn" title="Copy raw headers to clipboard">Copy</button>
        </div>
        <div id="raw-headers"></div>
      </div>
    </div>

    <!-- No data state -->
    <div id="no-data" class="hidden">
      <p>No headers available for this page.</p>
      <p class="hint">Try navigating to a regular website.</p>
    </div>

    <!-- Internal page state -->
    <div id="internal-page" class="hidden">
      <div id="internal-icon">&#128274;</div>
      <p class="internal-title">Internal Page</p>
      <p id="internal-scheme"></p>
      <p class="hint">Not a website — security headers don't apply here.</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
